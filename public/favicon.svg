<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="128" height="128">
  <defs>
    <!-- Base Gradient (Peach Orange with left shadow) -->
    <linearGradient id="base-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f08b53" />
      <stop offset="28%" stop-color="#f08b53" />
      <stop offset="28.1%" stop-color="#fca065" />
      <stop offset="100%" stop-color="#fca065" />
    </linearGradient>

    <!-- Stand Gradient (Gold with left shadow) -->
    <linearGradient id="stand-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#fbda5c" />
      <stop offset="34%" stop-color="#fbda5c" />
      <stop offset="34.1%" stop-color="#fde675" />
      <stop offset="100%" stop-color="#fde675" />
    </linearGradient>

    <!-- Sphere BG Gradient (Deep Purple with left shadow) -->
    <linearGradient id="ball-bg-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#50256e" />
      <stop offset="38%" stop-color="#50256e" />
      <stop offset="38.1%" stop-color="#5f2d7b" />
      <stop offset="100%" stop-color="#5f2d7b" />
    </linearGradient>

    <!-- Cloud Gradient (Lavender with left shadow) -->
    <linearGradient id="cloud-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#a585c7" />
      <stop offset="38%" stop-color="#a585c7" />
      <stop offset="38.1%" stop-color="#bca2dc" />
      <stop offset="100%" stop-color="#bca2dc" />
    </linearGradient>

    <!-- Clip Path for the Sphere content -->
    <clipPath id="ball-clip">
      <circle cx="256" cy="216" r="180" />
    </clipPath>
  </defs>

  <!-- 1. Stand (renders behind/under the sphere) -->
  <path d="M 126 380 L 386 380 L 421 460 L 91 460 Z" fill="url(#stand-grad)" />

  <!-- 2. Base -->
  <rect x="66" y="460" width="380" height="40" rx="20" fill="url(#base-grad)" />

  <!-- 3. Sphere/Ball -->
  <g clip-path="url(#ball-clip)">
    <!-- Sphere Background -->
    <circle cx="256" cy="216" r="180" fill="url(#ball-bg-grad)" />

    <!-- Cloud shape covering bottom-half -->
    <path d="M 70 230 C 110 160, 160 160, 180 200 C 210 130, 290 130, 320 200 C 350 150, 410 150, 442 230 L 442 410 L 70 410 Z" fill="url(#cloud-grad)" />

    <!-- Stars inside the sphere -->
    <!-- Top-Left Star (Large) -->
    <path d="M 175 60 Q 175 115 230 115 Q 175 115 175 170 Q 175 115 120 115 Q 175 115 175 60 Z" fill="#fee77d" />

    <!-- Right Star (Medium-Large) -->
    <path d="M 370 175 Q 370 230 425 230 Q 370 230 370 285 Q 370 230 315 230 Q 370 230 370 175 Z" fill="#fee77d" />

    <!-- Bottom-Middle Star (Medium) -->
    <path d="M 220 255 Q 220 300 265 300 Q 220 300 220 345 Q 220 300 175 300 Q 220 300 220 255 Z" fill="#fee77d" />
  </g>
</svg>
